name: mesh-frontend

networks:
  mesh-net:
    name: mesh-net
    external: true

volumes:
  redis_bot_data:
    name: redis_bot_data
    external: true
  mesh_bot_data:
    name: mesh_bot_data
    external: true

services:
  redis-bot:
    image: redis:8-alpine
    container_name: redis-bot
    hostname: redis-bot
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory-policy allkeys-lru --loglevel warning --requirepass ${REDIS_BOT_PASSWORD}
    environment:
      - REDIS_BOT_PASSWORD=${REDIS_BOT_PASSWORD}
    volumes:
      - redis_bot_data:/data
    networks: [mesh-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_BOT_PASSWORD} --no-auth-warning ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 3

  mesh-bot:
    image: ghcr.io/iluckyguy/mesh-bot:latest
    container_name: mesh-bot
    hostname: mesh-bot
    restart: unless-stopped
    depends_on:
      redis-bot:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL_BOT}
      - DATABASE_MODE=postgresql
      - BOT_TOKEN=${BOT_TOKEN}
      - TELEGRAM_OIDC_ENABLED=true
      - TELEGRAM_OIDC_CLIENT_ID=8746136530
      - TELEGRAM_OIDC_CLIENT_SECRET=mC_rkXlC1_DXIeZx7HojM9sTg2bsj2IxyRryF-k5AkB5bWNUV44zYw
      - ADMIN_IDS=${ADMIN_IDS}
      - PROXY_URL=${PROXY_URL}
      - REDIS_URL=redis://:${REDIS_BOT_PASSWORD}@redis-bot:6379/0
      - SUPPORT_USERNAME=${SUPPORT_USERNAME}
      - SUPPORT_MENU_ENABLED=${SUPPORT_MENU_ENABLED:-false}
      - BOT_DISPLAY_NAME=${BOT_DISPLAY_NAME:-CloudWEB Mesh Bot}
      - WEB_API_TITLE=${WEB_API_TITLE:-CloudWEB Mesh Bot API}
      - DEVELOPER_CONTACT_URL=${DEVELOPER_CONTACT_URL}
      - COMMUNITY_URL=${COMMUNITY_URL}
      - GITHUB_BOT_URL=${GITHUB_BOT_URL:-https://github.com/iLuckyGUY/mesh-bot}
      - GITHUB_CABINET_URL=${GITHUB_CABINET_URL:-https://github.com/iLuckyGUY/mesh-app}
      - CABINET_REPO=${CABINET_REPO:-iLuckyGUY/mesh-app}
      - VERSION_CHECK_REPO=${VERSION_CHECK_REPO:-iLuckyGUY/mesh-bot}
      - CABINET_ENABLED=true
      - CABINET_URL=${CABINET_URL}
      - MINIAPP_CUSTOM_URL=${CABINET_URL}
      - CABINET_TRUSTED_PROXIES=172.0.0.0/8,10.0.0.0/8
      - CABINET_JWT_SECRET=${CABINET_JWT_SECRET}
      - CABINET_ACCESS_TOKEN_EXPIRE_MINUTES=15
      - CABINET_REFRESH_TOKEN_EXPIRE_DAYS=7
      - CABINET_ALLOWED_ORIGINS=${CABINET_ALLOWED_ORIGINS}
      - CABINET_EMAIL_VERIFICATION_ENABLED=true
      - CABINET_EMAIL_AUTH_ENABLED=true
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - WEB_API_ENABLED=true
      - WEB_API_PORT=8080
      - WEB_API_HOST=0.0.0.0
      - REMNAWAVE_API_URL=http://mesh-cp:3000
      - REMNAWAVE_API_KEY=${REMNAWAVE_API_KEY_BOT}
      - REMNAWAVE_AUTH_TYPE=api_key
      - REMNAWAVE_AUTO_SYNC_ENABLED=${REMNAWAVE_AUTO_SYNC_ENABLED:-false}
      - REMNAWAVE_WEBHOOK_ENABLED=${REMNAWAVE_WEBHOOK_ENABLED:-false}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED:-false}
      - IS_TELEGRAM_NOTIFICATIONS_ENABLED=${IS_TELEGRAM_NOTIFICATIONS_ENABLED:-false}
      - ADMIN_NOTIFICATIONS_ENABLED=${ADMIN_NOTIFICATIONS_ENABLED:-true}
      - ADMIN_NOTIFICATIONS_CHAT_ID=${ADMIN_NOTIFICATIONS_CHAT_ID}
      - ADMIN_NOTIFICATIONS_TOPIC_ID=${ADMIN_NOTIFICATIONS_TOPIC_ID}
      - ADMIN_REPORTS_ENABLED=${ADMIN_REPORTS_ENABLED:-false}
      - ENABLE_LOGO_MODE=${ENABLE_LOGO_MODE:-false}
      - DOCKER_ENV=true
      - TZ=Europe/Moscow
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SALES_MODE=${SALES_MODE:-tariffs}
      - TRAFFIC_SELECTION_MODE=${TRAFFIC_SELECTION_MODE:-selectable}
      - TRAFFIC_TOPUP_ENABLED=${TRAFFIC_TOPUP_ENABLED:-true}
      - DEFAULT_DEVICE_LIMIT=${DEFAULT_DEVICE_LIMIT:-3}
      - MAX_DEVICES_LIMIT=${MAX_DEVICES_LIMIT:-15}
      - DEFAULT_TRAFFIC_LIMIT_GB=${DEFAULT_TRAFFIC_LIMIT_GB:-100}
      - TRIAL_DURATION_DAYS=${TRIAL_DURATION_DAYS:-3}
      - TRIAL_TRAFFIC_LIMIT_GB=${TRIAL_TRAFFIC_LIMIT_GB:-10}
      - TRIAL_DEVICE_LIMIT=${TRIAL_DEVICE_LIMIT:-1}
      - SIMPLE_SUBSCRIPTION_ENABLED=${SIMPLE_SUBSCRIPTION_ENABLED:-false}
      - AVAILABLE_SUBSCRIPTION_PERIODS=${AVAILABLE_SUBSCRIPTION_PERIODS:-30,90,180}
      - AVAILABLE_RENEWAL_PERIODS=${AVAILABLE_RENEWAL_PERIODS:-30,90,180}
      - REFERRAL_PROGRAM_ENABLED=${REFERRAL_PROGRAM_ENABLED:-false}
      - ENABLE_AUTOPAY=${ENABLE_AUTOPAY:-false}
      - TELEGRAM_STARS_ENABLED=${TELEGRAM_STARS_ENABLED:-false}
      - TELEGRAM_STARS_RATE_RUB=${TELEGRAM_STARS_RATE_RUB:-1.79}
      - YOOKASSA_ENABLED=${YOOKASSA_ENABLED:-false}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - FREEKASSA_ENABLED=${FREEKASSA_ENABLED:-false}
      - CRYPTOBOT_ENABLED=${CRYPTOBOT_ENABLED:-false}
      - CRYPTOBOT_API_TOKEN=${CRYPTOBOT_API_TOKEN}
      - TRIBUTE_ENABLED=${TRIBUTE_ENABLED:-false}
      - HELEKET_ENABLED=${HELEKET_ENABLED:-false}
      - MULENPAY_ENABLED=${MULENPAY_ENABLED:-false}
      - PAL24_ENABLED=${PAL24_ENABLED:-false}
      - PLATEGA_ENABLED=${PLATEGA_ENABLED:-false}
      - KASSA_AI_ENABLED=${KASSA_AI_ENABLED:-false}
      - RIOPAY_ENABLED=${RIOPAY_ENABLED:-false}
      - SEVERPAY_ENABLED=${SEVERPAY_ENABLED:-false}
      - PAYPEAR_ENABLED=${PAYPEAR_ENABLED:-false}
      - ROLLYPAY_ENABLED=${ROLLYPAY_ENABLED:-false}
      - AURAPAY_ENABLED=${AURAPAY_ENABLED:-false}
      - CLOUDPAYMENTS_ENABLED=${CLOUDPAYMENTS_ENABLED:-false}
      - WATA_ENABLED=${WATA_ENABLED:-false}
    volumes:
      - mesh_bot_data:/app/data
    networks:
      mesh-net:
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8080)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mesh-app:
    image: iluckyguy/mesh-app:latest
    container_name: mesh-app
    hostname: mesh-app
    restart: unless-stopped
    depends_on:
      mesh-bot:
        condition: service_started
    networks: [mesh-net]
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
