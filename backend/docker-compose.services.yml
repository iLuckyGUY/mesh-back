name: mesh-services

networks:
  mesh-net:
    name: mesh-net
    external: true
  supabase-cloudweb_default:
    external: true

volumes:
  redis_bot_data:
    name: redis_bot_data
  mesh_bot_data:
    name: mesh_bot_data

services:
  redis-bot:
    image: valkey/valkey:9-alpine
    container_name: redis-bot
    hostname: redis-bot
    restart: unless-stopped
    command: valkey-server --save "" --appendonly no --maxmemory-policy allkeys-lru --loglevel warning
    volumes:
      - redis_bot_data:/data
    networks: [mesh-net]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mesh-bot:
    image: iluckyguy/mesh-bot:latest
    container_name: mesh-bot
    hostname: mesh-bot
    restart: unless-stopped
    depends_on:
      redis-bot:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL_BOT}
      DATABASE_MODE: postgresql
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_IDS: ${ADMIN_IDS}
      PROXY_URL: ${PROXY_URL}
      REDIS_URL: redis://:${REDIS_BOT_PASSWORD}@redis-bot:6379/0
      SUPPORT_USERNAME: ${SUPPORT_USERNAME}
      SUPPORT_MENU_ENABLED: "false"
      CABINET_ENABLED: "true"
      CABINET_URL: ${CABINET_URL}
      CABINET_JWT_SECRET: ${CABINET_JWT_SECRET}
      CABINET_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      CABINET_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CABINET_ALLOWED_ORIGINS: ${CABINET_ALLOWED_ORIGINS}
      CABINET_EMAIL_VERIFICATION_ENABLED: "false"
      CABINET_EMAIL_AUTH_ENABLED: "false"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      WEB_API_ENABLED: "true"
      WEB_API_PORT: "8080"
      WEB_API_HOST: "0.0.0.0"
      REMNAWAVE_API_URL: http://mesh-cp:3000
      REMNAWAVE_API_KEY: ${REMNAWAVE_API_KEY_BOT}
      REMNAWAVE_AUTH_TYPE: api_key
      REMNAWAVE_AUTO_SYNC_ENABLED: "false"
      REMNAWAVE_WEBHOOK_ENABLED: "false"
      WEBHOOK_ENABLED: "false"
      IS_TELEGRAM_NOTIFICATIONS_ENABLED: "false"
      ADMIN_NOTIFICATIONS_ENABLED: "true"
      ADMIN_NOTIFICATIONS_CHAT_ID: ${ADMIN_NOTIFICATIONS_CHAT_ID}
      ADMIN_NOTIFICATIONS_TOPIC_ID: ${ADMIN_NOTIFICATIONS_TOPIC_ID}
      ADMIN_REPORTS_ENABLED: "false"
      ENABLE_LOGO_MODE: "false"
      DOCKER_ENV: "true"
      TZ: Europe/Moscow
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SALES_MODE: tariffs
      TRAFFIC_SELECTION_MODE: selectable
      TRAFFIC_TOPUP_ENABLED: "true"
      DEFAULT_DEVICE_LIMIT: "3"
      MAX_DEVICES_LIMIT: "15"
      DEFAULT_TRAFFIC_LIMIT_GB: "100"
      TRIAL_DURATION_DAYS: "3"
      TRIAL_TRAFFIC_LIMIT_GB: "10"
      TRIAL_DEVICE_LIMIT: "1"
      SIMPLE_SUBSCRIPTION_ENABLED: "false"
      AVAILABLE_SUBSCRIPTION_PERIODS: "30,90,180"
      AVAILABLE_RENEWAL_PERIODS: "30,90,180"
      REFERRAL_PROGRAM_ENABLED: "false"
      ENABLE_AUTOPAY: "false"
      TELEGRAM_STARS_ENABLED: "false"
      YOOKASSA_ENABLED: "false"
      FREEKASSA_ENABLED: "false"
      CRYPTOBOT_ENABLED: "false"
      TRIBUTE_ENABLED: "false"
      HELEKET_ENABLED: "false"
      MULENPAY_ENABLED: "false"
      PAL24_ENABLED: "false"
      PLATEGA_ENABLED: "false"
      KASSA_AI_ENABLED: "false"
      RIOPAY_ENABLED: "false"
      SEVERPAY_ENABLED: "false"
      PAYPEAR_ENABLED: "false"
      ROLLYPAY_ENABLED: "false"
      AURAPAY_ENABLED: "false"
      CLOUDPAYMENTS_ENABLED: "false"
      WATA_ENABLED: "false"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - mesh_bot_data:/app/data
    networks:
      mesh-net:
      supabase-cloudweb_default:
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mesh-app:
    image: iluckyguy/mesh-app:latest
    container_name: mesh-app
    hostname: mesh-app
    restart: unless-stopped
    depends_on:
      mesh-bot:
        condition: service_started
    ports:
      - "127.0.0.1:3020:80"
    networks: [mesh-net]
